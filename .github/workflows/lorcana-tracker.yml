name: Lorcana Tracker

on:
  schedule:
    # Times are in UTC. Default = roughly 6am, 12pm, 6pm Pacific time
    # (add/remove lines or change times to adjust frequency).
    - cron: "0 14 * * *"
    - cron: "0 20 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch: {}  # lets you click "Run workflow" manually anytime

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run tracker
        run: python3 lorcana_tracker.py

      - name: Commit and push updated results
        run: |
          git config user.name "lorcana-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add dashboard.html docs/index.html results_latest.json results_history.jsonl price_history.json run_log.txt
          git diff --cached --quiet || git commit -m "Update tracker results [skip ci]"
          git push
